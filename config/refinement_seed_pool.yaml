llm_refinement_template:
  objective: Generate 3 formula refinements from one seed factor, focused on stability,
    lower turnover, lower redundancy, or stronger economic interpretation.
  required_output_sections:
  - parent_factor
  - diagnosed_weaknesses
  - refinement_rationale
  - candidate_formulas
  - expected_behavior_change
  - risk_notes
  constraints:
  - Use only fields available in the current factors_store contract.
  - Prefer formulas expressible by existing operators.
  - Keep each candidate close to the parent family.
  - Avoid rephrasing the same formula with trivial window changes only.
