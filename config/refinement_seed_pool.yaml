version: 2
created_at: '2026-03-23'
project: factors_store
purpose: Seeded factor refinement for LLM-guided formula rewriting
evaluation_defaults:
  panel_path: ''
  start: '2018-01-01'
  apply_filters: true
  stock_only: true
  exclude_st: true
  exclude_suspended: true
  min_listed_days: 60
  backtest: true
  workers: 8
  horizon: 5
  n_groups: 5
  pure_mode: none
  cost_bps: 10.0
evaluation_protocol:
  search:
    start: '2016-01-01'
    end: '2022-12-30'
  selection:
    start: '2023-01-03'
    end: '2026-03-09'
  prompt_history_stage: search
  keep_decision_stage: selection
  promote_stage: selection
refinement_principles:
- Do not invent factors from scratch; start from strong seeds.
- Preserve the economic story of the parent factor.
- 'Prefer low-complexity edits: window changes, variable substitutions, neutralization,
  decay, smoothing, or interaction terms.'
- Penalize duplicate variants that are too correlated with the parent family.
- Optimize for stability, lower turnover, and lower redundancy, not only headline
  IC.
seed_groups:
- family: open_volume_correlation
  priority: high
  canonical_seed: alpha101.alpha003
  aliases:
  - alpha101.alpha006
  relation_note: alpha003 与 alpha006 本质上是同一套开盘价-成交活跃度逻辑，只是一个偏 rank 形式、一个偏 raw 形式。
  direction: positive_as_is
  implementation_paths:
  - factors_store/factors/alpha101_like.py
  - factors_store/factors/alpha191_like.py
  formulas:
    alpha101.alpha003: -corr(rank(open), rank(volume), 10)
    alpha101.alpha006: -corr(open, volume, 10)
  interpretation: 衡量开盘价相对位置与成交活跃度是否同步；更强的信号往往来自短期量价背离，或开盘阶段出现拥挤交易行为。
  likely_weaknesses:
  - 同家族冗余度较高。
  - raw 形式更容易受尺度和流动性水平影响。
  - 可能带有流动性或规模暴露。
  primary_objective: 降低换手，提升因子稳定性
  secondary_objective: 在不明显增加换手的前提下提升 RankICIR
  hard_constraints:
  - 必须保留开盘价与成交活跃度之间的核心逻辑
  - 最多只允许引入一个新的原始字段
  - 不能只靠符号翻转完成改写
  candidate_roles:
  - conservative
  - decorrelating
  - enhancing
  anti_patterns:
  - 只改时间窗
  - 只多包一层 rank 或类似包装
  - 三个候选几乎只是近重复变体
  - 完全改写成另一套逻辑
  allowed_edit_types:
  - 时间窗替换
  - 算子替换
  - 插入归一化
  - 插入平滑或衰减
  - 增加一条辅助分支
  refinement_axes:
  - 对相关性结果加入 decay 或平滑，降低信号抖动
  - 和波动惩罚项结合，抑制过度拥挤个股
  - 比较 raw、rank、zscore 三种输入形式，找到最稳定的表达
  - 在相关性计算前尝试行业中性化，去除风格暴露
  - 适度缩短或拉长相关性窗口
  - 把 volume 替换为 amount、turnover 或 volume/advN
- family: close_volume_covariance
  priority: high
  canonical_seed: alpha101.alpha013
  aliases: []
  direction: positive_as_is
  implementation_paths:
  - factors_store/factors/alpha101_like.py
  - factors_store/factors/alpha191_like.py
  formulas:
    alpha101.alpha013: -rank(cov(rank(close), rank(volume), 5))
  interpretation: 捕捉短周期内收盘价强弱与成交活跃度是否同步；更有效的部分通常来自量价背离或确认失败后的修复。
  likely_weaknesses:
  - 与 high-volume covariance 家族非常接近。
  - 短窗口容易带来较大噪声。
  - 对极端换手日比较敏感。
  primary_objective: 降低换手
  secondary_objective: 在不削弱家族辨识度的前提下提升 RankICIR
  hard_constraints:
  - 必须保留收盘价与参与度确认之间的核心逻辑
  - 最多只允许新增一层嵌套
  - 不能直接退化成 alpha016 那种 high-volume 重复体
  candidate_roles:
  - conservative
  - decorrelating
  - enhancing
  anti_patterns:
  - 只改时间窗
  - 只把 close 机械替换成 high
  - 三个候选共享同一个主 skeleton
  - 完全换成另一套逻辑
  allowed_edit_types:
  - 算子替换
  - 插入归一化
  - 插入平滑或衰减
  - 时间窗替换
  - 增加一条辅助分支
  refinement_axes:
  - 把 close 替换为 vwap、close/open 混合项或残差 close
  - 把 volume 替换为 amount 或 turnover
  - 加入滚动波动惩罚以减少噪声
  - 对 covariance 输出再做 ts_rank 或 decay
  - 测试 3/5/10/20 天等相近窗口
- family: high_volume_covariance
  priority: high
  canonical_seed: alpha101.alpha016
  aliases: []
  direction: positive_as_is
  implementation_paths:
  - factors_store/factors/alpha101_like.py
  - factors_store/factors/alpha191_like.py
  formulas:
    alpha101.alpha016: -rank(cov(rank(high), rank(volume), 5))
  interpretation: 衡量短周期内日内高点是否得到成交活跃度确认；通常可用来捕捉拥挤交易或冲高失败后的回落信号。
  likely_weaknesses:
  - 与 alpha013、alpha044 亲缘关系很近。
  - 可能过度聚焦日内尖峰。
  - 容易与波动或动量反转逻辑重叠。
  primary_objective: 降低与相邻家族的冗余
  secondary_objective: 保持或提升 RankICIR
  hard_constraints:
  - 必须保留高点确认或冲高失败的核心逻辑
  - 不能退化成纯 close-volume 家族
  - 最多只允许引入一个新的原始字段
  candidate_roles:
  - conservative
  - decorrelating
  - enhancing
  anti_patterns:
  - 只改时间窗
  - 三个候选都只是 high 到 vwap 的轻微替换
  - 泛化成普通波动率公式
  - 完全改写逻辑
  allowed_edit_types:
  - 算子替换
  - 插入归一化
  - 时间窗替换
  - 价格代理替换
  - 增加一条辅助分支
  refinement_axes:
  - 把 high 替换为 max(vwap, close)、high-low spread 或 upper shadow
  - 把 covariance 替换为 correlation
  - 用 volume/advN 代替 raw volume
  - 在交互前对 high 或 vwap 做行业中性化
  - 和 shadow 或 amplitude 因子做轻量组合
- family: high_ranked_volume_correlation
  priority: high
  canonical_seed: alpha101.alpha044
  aliases: []
  direction: positive_as_is
  implementation_paths:
  - factors_store/factors/alpha101_like.py
  - factors_store/factors/alpha191_like.py
  formulas:
    alpha101.alpha044: -corr(high, rank(volume), 5)
  interpretation: 衡量短周期内日内高点是否伴随相对更高的成交活跃度，是一类更纯粹的高点-量能确认信号。
  likely_weaknesses:
  - 在很短窗口下容易不稳定。
  - 可能只是同一套量能确认逻辑的另一种视角。
  - 可能需要平滑或轻微非线性才能更稳。
  primary_objective: 提升 RankICIR
  secondary_objective: 降低冗余并把换手控制在合理范围
  hard_constraints:
  - 必须保留高点与相对成交活跃度之间的核心逻辑
  - 不能只是把 5 日窗口换成别的窗口
  - 不能生成三个同一个主 skeleton 的候选
  candidate_roles:
  - conservative
  - decorrelating
  - enhancing
  anti_patterns:
  - 只改时间窗
  - 只额外包一层 rank 或类似包装
  - 三个候选共享同一个主 skeleton
  - 完全换成另一套逻辑
  allowed_edit_types:
  - 时间窗替换
  - 算子替换
  - 插入归一化
  - 插入平滑或衰减
  - 价格或成交代理替换
  refinement_axes:
  - 把 high 替换为 upper shadow、high/close ratio 或 high-vwap spread
  - 把 rank(volume) 替换为 rank(amount) 或 rank(turnover)
  - 对相关性结果加入 rolling decay 或 ts_rank
  - 比较 5/10/20 日等相近窗口
- family: high_volatility_times_volume_correlation
  priority: high
  canonical_seed: alpha101.alpha040
  aliases: []
  direction: positive_as_is
  implementation_paths:
  - factors_store/factors/alpha101_like.py
  - factors_store/factors/alpha191_like.py
  formulas:
    alpha101.alpha040: -rank(std(high, 10)) * corr(high, volume, 10)
  interpretation: 把高点波动代理和高点-成交确认结合起来，常用来识别既波动又拥挤的标的。
  likely_weaknesses:
  - 乘法结构可能放大噪声。
  - 过度依赖单一波动代理 `std(high,10)`。
  - 有机会做得更简洁或更稳健。
  primary_objective: 提升稳定性
  secondary_objective: 在不过度增复杂度的前提下保住收益强度
  hard_constraints:
  - 必须保留高波动高点与拥挤交易结合的核心逻辑
  - 最多只允许引入一个新的原始字段
  - 不能把公式复杂度明显堆高到超出 parent
  candidate_roles:
  - conservative
  - decorrelating
  - enhancing
  anti_patterns:
  - 只改时间窗
  - 通过堆分支无意义增肥
  - 三个候选都只是同一种乘法结构
  - 完全换成别的逻辑
  allowed_edit_types:
  - 算子替换
  - 波动代理替换
  - 插入归一化
  - 插入平滑或衰减
  - 增加一条辅助分支
  refinement_axes:
  - 把 std(high,10) 替换为 amplitude、upper shadow std 或 realized vol
  - 对相关性分支做 decay、clipping 或其他归一化
  - 尝试把乘法改成加权和或比值形式
  - 优先测试更低换手的版本
- family: industry_neutral_nonlinear_flow
  priority: high
  canonical_seed: alpha101.alpha069
  aliases: []
  direction: positive_as_is
  implementation_paths:
  - factors_store/factors/alpha101_like.py
  formulas:
    alpha101.alpha069: -rank(ts_max(delta(indneutralize(vwap, industry), 3), 5)) ^
      ts_rank(corr(0.490655*close + 0.509345*vwap, adv20, 5), 9)
  interpretation: 这是一个更复杂的家族，把行业中性化后的相对价格强弱与非线性的价格-流动性交互结合起来。
  likely_weaknesses:
  - 比简单量价家族更复杂，也更难解释。
  - 幂运算可能过度放大尾部。
  - 样本外可能更脆弱。
  primary_objective: 在保留核心逻辑的前提下降低复杂度
  secondary_objective: 提升稳定性并降低换手
  hard_constraints:
  - 必须保留行业中性相对强弱与流动性确认的双分支逻辑
  - 不能把流动性确认分支完全删掉
  - 最多只允许再增加一层嵌套
  candidate_roles:
  - conservative
  - decorrelating
  - enhancing
  anti_patterns:
  - 只改时间窗
  - 只是把幂换成乘法但其他都不动
  - 完全去掉行业中性逻辑
  - 彻底改写成别的因子
  allowed_edit_types:
  - 算子替换
  - 插入平滑或衰减
  - 插入归一化
  - 时间窗替换
  - 增加一条辅助分支
  refinement_axes:
  - 把幂运算替换为乘法、比值或裁剪后的非线性
  - 尝试不同的中性化目标：vwap、close、high-low 中位价
  - 把 adv20 替换为基于 amount 的流动性代理
  - 对右侧相关性分支做平滑
  - 在保留行业中性逻辑的前提下降低整体复杂度
- family: amount_volatility
  priority: medium
  canonical_seed: alpha191.alpha095
  aliases: []
  direction: use_negative_sign
  implementation_paths:
  - factors_store/factors/alpha191_like.py
  formulas:
    alpha191.alpha095: std(amount, 20)
  interpretation: A pure turnover-value instability signal; as a negative factor it
    often captures crowding, event-driven churn, or unstable participation.
  likely_weaknesses:
  - Very close to a raw liquidity/risk proxy.
  - Can be dominated by size and trading-intensity exposure.
  - Economic logic may be too broad unless combined with price structure.
  refinement_axes:
  - use -std(amount,20) explicitly
  - normalize by mean(amount,20)
  - replace amount with turnover or amount/float_cap
  - interact with returns, amplitude, or shadow factors
  - cross-sectionally neutralize size or liquidity exposure
- family: amount_level
  priority: medium
  canonical_seed: alpha191.alpha132
  aliases: []
  direction: use_negative_sign
  implementation_paths:
  - factors_store/factors/alpha191_like.py
  formulas:
    alpha191.alpha132: mean(amount, 20)
  interpretation: A simple trading-value level factor; as a negative factor it often
    leans toward less crowded, less fully priced names.
  likely_weaknesses:
  - Very likely to overlap with size and liquidity.
  - Too simple to be a standalone long-term family.
  - Needs normalization or interaction to become more structural.
  refinement_axes:
  - use -mean(amount,20) explicitly
  - scale by float cap, turnover, or average true range
  - combine with amount volatility or return asymmetry
  - add industry or size neutralization
- family: salience_panic_score
  priority: medium
  canonical_seed: qp_salience.std_score_60
  aliases:
  - qp_salience.terrified_score_60
  direction: use_negative_sign
  implementation_paths:
  - factors_store/factors/qp_salience.py
  formulas:
    qp_salience.std_score_60: ts_std(mul(div(abs(sub(returns, cs_mean(returns))),
      add(add(abs(returns), abs(cs_mean(returns))), 0.1)), returns), 60)
    qp_salience.terrified_score_60: mul(0.5, add(ts_mean(mul(div(abs(sub(returns,
      cs_mean(returns))), add(add(abs(returns), abs(cs_mean(returns))), 0.1)), returns),
      60), ts_std(mul(div(abs(sub(returns, cs_mean(returns))), add(add(abs(returns),
      abs(cs_mean(returns))), 0.1)), returns), 60)))
  interpretation: Salience-panic family from QuantsPlaybook. Higher salience-weighted
    return volatility or terrified score often reflects crowded fear or unstable attention,
    so the useful direction is typically the negative sign.
  likely_weaknesses:
  - May overlap with volatility or crash-sensitivity effects.
  - Can be noisy around event-driven return spikes.
  - Needs clearer separation between panic, volatility, and raw turnover exposure.
  refinement_axes:
  - keep the negative sign and refine the panic proxy rather than flipping direction
  - blend salience panic with turnover or amount normalization
  - replace pure std leg with smoother ts_rank, ema, or decay
  - interact with amplitude, shadow, or reversal structure
  - test whether avg_score/std_score mixtures are more robust than raw terrified_score
- family: amplitude_structure
  priority: medium
  canonical_seed: qp_volatility.amplitude_spread_5
  aliases:
  - qp_volatility.amplitude_high_20
  - qp_volatility.amplitude_spread_de_turn20
  direction: use_negative_sign
  implementation_paths:
  - factors_store/factors/qp_volatility.py
  formulas:
    qp_volatility.amplitude_spread_5: sub(div(ts_sum(mul(sub(div(high, add(low, 1e-12)),
      1), greater(ts_rank(close, 5), 0.8)), 5), add(ts_sum(greater(ts_rank(close,
      5), 0.8), 5), 1e-12)), div(ts_sum(mul(sub(div(high, add(low, 1e-12)), 1), less(ts_rank(close,
      5), 0.2)), 5), add(ts_sum(less(ts_rank(close, 5), 0.2), 5), 1e-12)))
    qp_volatility.amplitude_high_20: div(ts_sum(mul(sub(div(high, add(low, 1e-12)),
      1), greater(ts_rank(close, 20), 0.8)), 20), add(ts_sum(greater(ts_rank(close,
      20), 0.8), 20), 1e-12))
    qp_volatility.amplitude_spread_de_turn20: cross_sectional_residual(amplitude_high_20
      - amplitude_low_20, turnover_mean_20)
  interpretation: Amplitude-structure family from QuantsPlaybook. Use the negative
    sign. The core hypothesis is that abnormally strong high-state amplitude or high-minus-low
    amplitude spread reflects over-heated trading structure, crowding, or unstable
    range expansion rather than healthy trend. Refinements should preserve the amplitude-state
    comparison and improve confirmation, conditioning, or robustness instead of collapsing
    into generic volatility.
  likely_weaknesses:
  - Short-window amplitude spread may be unstable and noisy around isolated range
    spikes.
  - Can easily collapse into a generic volatility, range, or reversal factor if the
    state-comparison structure is lost.
  - May need turnover, amount, pressure, or vwap-style confirmation to separate crowding
    from healthy expansion.
  refinement_axes:
  - keep the negative sign and keep an explicit high-state versus low-state comparison;
    do not rewrite it as plain std or plain amplitude mean
  - replace the state anchor with upper shadow, lower shadow, intraday position, turnover
    state, rel_volume, or rel_amount when the same crowding story still makes sense
  - use where/count/sumif to build conditional state concentration terms, such as
    counting heated days or summing range only when turnover or price-position confirms
  - smooth the state legs with mean, ema, decay_linear, or bucket_sum-based aggregation
    instead of only changing the window
  - test normalized spread forms such as high_state / (low_state + eps), zscored high_state
    minus zscored low_state, or pressure-confirmed amplitude spread
- family: qp_amplitude_sliced_momentum
  priority: medium
  canonical_seed: qp_momentum.amp_spread_ret_60_q30
  aliases:
  - qp_momentum.amp_spread_ret_120_q30
  direction: positive_as_is
  implementation_paths:
  - factors_store/factors/qp_momentum.py
  formulas:
    qp_momentum.amp_spread_ret_60_q30: sum(low_amplitude_day_returns, 60, q=0.3) -
      sum(high_amplitude_day_returns, 60, q=0.3)
    qp_momentum.amp_spread_ret_120_q30: sum(low_amplitude_day_returns, 120, q=0.3)
      - sum(high_amplitude_day_returns, 120, q=0.3)
  interpretation: Amplitude-sliced momentum family. Keep the main idea of comparing
    returns earned on calmer low-amplitude days against returns earned on noisy high-amplitude
    days. Higher values mean medium-horizon momentum is carried more by stable, lower-amplitude
    trading than by crowded bursts. Use bucket_sum or closely related conditional
    operators so the sliced structure remains explicit rather than drifting into ordinary
    momentum.
  likely_weaknesses:
  - May partly overlap with anti-spike or low-volatility momentum if the low-bucket
    versus high-bucket contrast becomes too weak.
  - Bucket cut choices like q=0.3 and lookback length can be parameter-sensitive.
  - Can drift into a disguised reversal or generic quality-momentum proxy if the sliced
    return construction is dropped.
  refinement_axes:
  - retain the low-bucket minus high-bucket sliced-momentum structure and implement
    it with bucket_sum or explicit conditional aggregation
  - replace the return leg with capped returns, cs_zscore(returns), vol-adjusted returns,
    or where-filtered returns that downweight noisy spikes
  - replace amplitude as the slicing key with upper shadow, lower shadow, intraday
    position, turnover state, rel_volume, or rel_amount when the stable-versus-crowded
    narrative still holds
  - change the aggregation form with bucket_sum, bucket_sum on signed returns, count(gt(return_leg,0),
    w) minus count(lt(return_leg,0), w), or smoothed bucket legs before taking the
    spread
  - blend the sliced spread with pressure, vwap bias, or shadow confirmation instead
    of only retuning q or the window
- family: qp_high_amplitude_reversal
  priority: medium
  canonical_seed: qp_momentum.amp_high_ret_60_q30
  aliases:
  - qp_momentum.amp_high_ret_120_q30
  - cicc_daily.mmt_range_m_21_q20
  direction: use_negative_sign
  implementation_paths:
  - factors_store/factors/qp_momentum.py
  - factors_store/factors/cicc_daily.py
  formulas:
    qp_momentum.amp_high_ret_60_q30: sum(high_amplitude_day_returns, 60, q=0.3)
    qp_momentum.amp_high_ret_120_q30: sum(high_amplitude_day_returns, 120, q=0.3)
    cicc_daily.mmt_range_m_21_q20: sum(high_amplitude_day_returns, 21, q=0.2) - sum(low_amplitude_day_returns,
      21, q=0.2)
  interpretation: High-amplitude reversal family. Use the negative sign. The useful
    hypothesis is that returns concentrated in the highest-amplitude days are more
    likely to be noisy, crowded, or over-extended bursts than durable trend. Refinements
    should preserve the explicit high-bucket return concentration idea, preferably
    through bucket_sum or conditional aggregation, instead of turning into a generic
    reversal factor.
  likely_weaknesses:
  - Can become too close to generic over-heating, reversal, or volatility logic if
    the high-bucket concentration structure is lost.
  - Pure high-amplitude return sums may be noisy without a calmer-day reference leg
    or extra pressure/liquidity confirmation.
  - Window-only edits are likely to produce redundant variants.
  refinement_axes:
  - keep the negative sign and keep an explicit high-bucket return concentration term
    built with bucket_sum, sumif, or where
  - replace the return leg with clipped returns, cs_zscore(returns), vol-adjusted
    returns, or sign-aware aggregates such as count(gt(returns,0), w) minus count(lt(returns,0),
    w) inside the heated state
  - replace amplitude with upper shadow, intraday position, turnover state, rel_volume,
    or pressure-based crowding keys when preserving the burst-versus-follow-through
    story
  - blend the high-bucket burst term with pressure, vwap centroid, turnover, or amount
    confirmation rather than only changing lookback length
  - test high-bucket only, high-minus-low, or high / (low + eps) structures, but avoid
    collapsing into plain reversal
  - test whether high-amplitude reversal is stronger with upper-shadow or amplitude-spread
    confirmation
  - separate true reversal bursts from healthy breakout continuation
- family: lower_shadow_stability
  priority: medium
  canonical_seed: cicc_daily.vol_w_downshadow_std_3m
  aliases: []
  direction: use_negative_sign
  implementation_paths:
  - factors_store/factors/cicc_daily.py
  - factors_store/factors/qp_kline.py
  formulas:
    cicc_daily.vol_w_downshadow_std_3m: std((close - low) / low, 63)
  interpretation: Lower-shadow stability family. Use the negative sign. The core idea
    is that highly unstable lower-shadow behavior reflects erratic downside probing,
    inconsistent intraday repair, or noisy dip-buying, whereas calmer and more repeatable
    lower-shadow structure is more likely to signal orderly support.
  likely_weaknesses:
  - Can overlap with generic lower-shadow, downside-position, or short-horizon volatility
